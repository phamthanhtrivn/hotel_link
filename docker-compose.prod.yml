version: "3.9"

services:
  mariadb:
    image: mariadb:11
    container_name: hotellink-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: hotellink
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./scripts/data.sql:/docker-entrypoint-initdb.d/data.sql
    healthcheck:
      test: [ "CMD-SHELL", "mariadb -u root -p$${MARIADB_ROOT_PASSWORD} -e 'SELECT 1'" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - hotellink-network

  backend:
    image: ${DOCKERHUB_USERNAME}/hotellink-backend:latest
    container_name: hotellink-backend
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      EMAIL_APP_PASSWORD: ${EMAIL_APP_PASSWORD}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_PAYMENT_URL: ${VNPAY_PAYMENT_URL}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}
      VNPAY_VERSION: ${VNPAY_VERSION}
      VNPAY_COMMAND: ${VNPAY_COMMAND}
      VNPAY_ORDER_TYPE: ${VNPAY_ORDER_TYPE}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY}
      MOMO_END_POINT: ${MOMO_END_POINT}
      MOMO_REQUEST_TYPE: ${MOMO_REQUEST_TYPE}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8080:8080"
    networks:
      - hotellink-network

  frontend:
    image: ${DOCKERHUB_USERNAME}/hotellink-frontend:latest
    container_name: hotellink-frontend
    restart: unless-stopped
    environment:
      VITE_BASE_API_URL: ${BACKEND_URL}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hotellink-network

volumes:
  mariadb_data:

networks:
  hotellink-network:
    driver: bridge